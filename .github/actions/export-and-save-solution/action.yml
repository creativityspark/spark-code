# Export solution from an environment
# Extracts, commits, and pushes to source control with the changes
# More info:
# - https://www.azureguru.net/configuring-federated-credentials-in-microsoft-azure-using-github-actions
# - https://learn.microsoft.com/en-us/power-platform/alm/devops-github-actions
# - https://github.com/microsoft/powerplatform-build-tools/tree/main
# - https://github.com/marketplace/actions/powerplatform-actions

name: Export and Save Solution

on:
  workflow_call:
    inputs:
      solution_name:
        description: Solution to export.
        required: true
        type: string
      commit_message:
        description: Commit message. Supports %s for solution name and %v for version.
        required: true
        type: string
      version_update_strategy:
        description: Version segment to increment (major, minor, build, revision).
        required: true
        type: string
      export_folder:
        description: Folder where solution zip files are exported.
        required: true
        type: string
      solutions_folder:
        description: Folder where unmanaged solution is unpacked.
        required: true
        type: string
      create_tag:
        description: Create a git tag after commit.
        required: false
        type: boolean
        default: false
      client_id:
        description: Azure AD application (client) ID.
        required: true
        type: string
      tenant_id:
        description: Azure AD tenant ID.
        required: true
        type: string
      environment_url:
        description: Power Platform environment URL.
        required: true
        type: string

permissions:
  id-token: write   # Required for OIDC authentication
  contents: write

jobs:
  export-and-save-solution:
    environment: Dev
    runs-on: windows-latest

    steps:
    - name: Install Power Platform Tools
      uses: microsoft/powerplatform-actions/actions-install@v1

    - name: resolve-pac-path
      shell: pwsh
      run: |
        $pacExe = Get-ChildItem -Path $env:TEMP -Filter "pac.exe" -Recurse -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -match 'powerplatform-actions' } |
          Sort-Object -Property LastWriteTime -Descending |
          Select-Object -First 1

        if (-not $pacExe) {
          throw "Unable to locate pac.exe under $env:TEMP\powerplatform-actions-*"
        }

        $pacPath = $pacExe.FullName
        $pacDir  = $pacExe.DirectoryName
        "PAC_PATH=$pacPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "PAC_DIR=$pacDir"   | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        $pacDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Output "Resolved pac path: $pacPath"

    - name: Authenticate with Power Platform
      shell: pwsh
      run: |
        pac auth create --githubFederated --applicationId ${{ inputs.client_id }} --tenant ${{ inputs.tenant_id }} --environment ${{ inputs.environment_url }}

    - name: who-am-i
      uses: microsoft/powerplatform-actions/who-am-i@v1
      with:
        environment-url: ${{ inputs.environment_url }}
        app-id: ${{ inputs.client_id }}
        tenant-id: ${{ inputs.tenant_id }}

    - name: publish-all
      uses: microsoft/powerplatform-actions/publish-solution@v1
      with:
        environment-url: ${{ inputs.environment_url }}
        app-id: ${{ inputs.client_id }}
        tenant-id: ${{ inputs.tenant_id }}
        run-asynchronously: true

    - name: compute-next-version
      shell: pwsh
      run: |
        pac auth create --githubFederated --applicationId ${{ inputs.client_id }} --tenant ${{ inputs.tenant_id }} --environment ${{ inputs.environment_url }}
        $outputLines = pac solution list --json

        $solutionList = ConvertFrom-Json -InputObject $outputLines
        $solutionItem = $solutionList | Where-Object { $_.SolutionUniqueName -eq "${{ inputs.solution_name }}" }
        if (-not $solutionItem) {
          throw "Solution not found: ${{ inputs.solution_name }}"
        }
        $version = $solutionItem.VersionNumber
        Write-Output "Current version: $version"
        $versionParts = $version.Split('.')
        $strategy = "${{ inputs.version_update_strategy }}"
        switch ($strategy) {
          "major"    { $versionParts[0] = [int]$versionParts[0] + 1 }
          "minor"    { $versionParts[1] = [int]$versionParts[1] + 1 }
          "build"    { $versionParts[2] = [int]$versionParts[2] + 1 }
          "revision" { $versionParts[3] = [int]$versionParts[3] + 1 }
          default    { throw "Invalid version strategy: $strategy" }
        }
        $newVersion = "{0}.{1}.{2}.{3}" -f $versionParts[0], $versionParts[1], $versionParts[2], $versionParts[3]
        Write-Output "New version: $newVersion"
        echo "VERSION=$newVersion" >> $env:GITHUB_ENV

    - name: set-online-solution-version
      uses: microsoft/powerplatform-actions/set-online-solution-version@v1
      with:
        environment-url: ${{ inputs.environment_url }}
        app-id: ${{ inputs.client_id }}
        tenant-id: ${{ inputs.tenant_id }}
        name: ${{ inputs.solution_name }}
        version: ${{ env.VERSION }}

    - name: export-solution-unmanaged
      uses: microsoft/powerplatform-actions/export-solution@v1
      with:
        environment-url: ${{ inputs.environment_url }}
        app-id: ${{ inputs.client_id }}
        tenant-id: ${{ inputs.tenant_id }}
        solution-name: ${{ inputs.solution_name }}
        solution-output-file: ${{ inputs.export_folder}}/${{ inputs.solution_name }}.zip

    - name: export-solution-managed
      uses: microsoft/powerplatform-actions/export-solution@v1
      with:
        managed: true
        environment-url: ${{ inputs.environment_url }}
        app-id: ${{ inputs.client_id }}
        tenant-id: ${{ inputs.tenant_id }}
        solution-name: ${{ inputs.solution_name }}
        solution-output-file: ${{ inputs.export_folder}}/${{ inputs.solution_name }}_managed.zip

    - name: unpack-solution
      uses: microsoft/powerplatform-actions/unpack-solution@v1
      with:
        solution-file: ${{ inputs.export_folder}}/${{ inputs.solution_name }}.zip
        solution-folder: ${{ inputs.solutions_folder}}/${{ inputs.solution_name }}
        solution-type: 'Unmanaged'
        overwrite-files: true

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.solution_name }}
        path: |
          ${{ inputs.export_folder}}/${{ inputs.solution_name }}.zip
          ${{ inputs.export_folder}}/${{ inputs.solution_name }}_managed.zip

    - name: Config commit and push to git
      shell: pwsh
      run: |
        git config --global user.name '${{github.actor}}'
        git config --global user.email '${{github.actor}}@users.noreply.github.com'
        git add ${{ inputs.solutions_folder}}/\**

        $commitMsg = "${{ inputs.commit_message }}"
        $commitMsg = $commitMsg -replace '%s', '${{ inputs.solution_name }}'
        $commitMsg = $commitMsg -replace '%v', '${{ env.VERSION }}'

        git commit -m "$commitMsg"

        git push origin

    - name: Tag release
      if: ${{ inputs.create_tag }}
      run: |
        git tag v${{ env.VERSION }}
        git push origin v${{ env.VERSION }}

    - name: pac-auth-clear
      if: always()
      shell: pwsh
      run: |
        pac auth clear
