# Export, extracts, commits, and pushes to source control the solution called SparkCode.
# Generates an artifact with the exported solution zip file

name: Save SparkCode
run-name: Save SparkCode ${{ github.event.inputs.commit_message }}

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: Commit Message. Include task IDs here.
        required: true
      create_tag:
        type: boolean
        description: Tick this box to create a tag after commit.
        default: false
  
permissions:
  id-token: write   # Required for OIDC authentication
  contents: write

jobs:
setup:
  environment: Dev
  runs-on: ubuntu-latest
  steps:
    - name: Set Outputs
    id: set-output
    run: |
    echo "CLIENT_ID=${{ vars.CLIENT_ID }}" >> $GITHUB_OUTPUT
    echo "TENANT_ID=${{ vars.TENANT_ID }}" >> $GITHUB_OUTPUT 
    echo "ENVIRONMENT_URL=${{ vars.ENVIRONMENT_URL }}" >> $GITHUB_OUTPUT 
  outputs:
    CLIENT_ID: ${{ steps.set-output.outputs.CLIENT_ID }}
    TENANT_ID: ${{ steps.set-output.outputs.TENANT_ID }}
    ENVIRONMENT_URL: ${{ steps.set-output.outputs.ENVIRONMENT_URL }}
    
  export-and-save-solution:
    needs: setup
    uses: ./.github/workflows/export-and-save-solution.yml
    with:
      solution_name: SparkCode
      version_update_strategy: revision
      export_folder: out/export/
      solutions_folder: PowerPlatform/solutions/
      commit_message: ${{ github.event.inputs.commit_message }}
      create_tag: ${{ github.event.inputs.create_tag == 'true'}}
      client_id: ${{ needs.setup.outputs.CLIENT_ID }}
      tenant_id: ${{ needs.setup.outputs.TENANT_ID }}
      environment_url: ${{ needs.setup.outputs.ENVIRONMENT_URL }}