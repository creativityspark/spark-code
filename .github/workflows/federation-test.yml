name: Power Platform Deploy

permissions:
  id-token: write   # Required for OIDC authentication
  contents: read

on:
  workflow_dispatch:

jobs:
  deploy:
    environment: Dev
    runs-on: windows-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v2
        with:
          AddToolsToPath: true

      # 3️⃣ Authenticate using GitHub Federated Identity
      - name: Authenticate with Power Platform
        shell: pwsh
        run: |
          pac auth create --githubFederated --applicationId ${{vars.CLIENT_ID}} --tenant ${{vars.TENANT_ID}} --environment ${{vars.ENVIRONMENT_URL}}

      # 4️⃣ Example: List solutions
      - name: List solutions
        shell: pwsh
        run: |
          pac solution list --json

